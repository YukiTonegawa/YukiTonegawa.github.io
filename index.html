<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>Test</title>
    </head>
    <body>
        <h1>TestPage</h1>
        <p>GitHub Pagesのテストです。</p>
        <div class="form-group">
            <label for="f1">Name</label>
            <input type="text" id="f1" class="form-control">
        </div>
        <p>
            <script>
                document.write("JavaScriptではdocument.write(文)で文字を表示できます。");
            </script>
        </p>
        <p>
            <script type="module">
                import {random_permutation} from "./src/random.js";
                document.write("長さ10のランダムな順列を表示します。" + "<br>");
                random_permutation(10).forEach(function(elem) {
                    document.write(elem, " ");
                });
                document.write("<br>");
                document.close();
            </script>
        </p>
        <p>
            <script src="src/say_hello.js">
            </script>
        </p>
    </body>
</html>
